version: "3.9"

services:
  app:
    build:
      context: .
      target: production
    image: incredible-india-tourism:latest
    container_name: india-tourism-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=true
      - SECRET_KEY=local-dev-secret
    volumes:
      - ./data:/app/data          # persist user data on host
      - ./templates:/app/templates # hot-reload templates in dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: india-tourism-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app_data: