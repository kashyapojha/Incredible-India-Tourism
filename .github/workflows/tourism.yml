name: Incredible India — Full CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: incredible-india-tourism
  IMAGE_NAME: ${{ secrets.DOCKER_REGISTRY }}/incredible-india-tourism
  K8S_NAMESPACE: india-tourism

# ══════════════════════════════════════════════════════════════════════════════
jobs:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Code Quality
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install linters
        run: pip install flake8 black isort
      - name: Black check
        run: black --check --diff app.py
      - name: isort check
        run: isort --check-only --diff app.py
      - name: Flake8
        run: flake8 app.py --max-line-length=120 --ignore=E501,W503

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Unit Tests + Coverage
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Write tests
        run: |
          mkdir -p tests && cat > tests/test_app.py << 'EOF'
          import pytest, json, os, sys
          sys.path.insert(0, os.path.dirname(os.path.dirname(__file__)))
          from app import app, STATES, QUIZ_QUESTIONS, _hash

          @pytest.fixture
          def client(tmp_path):
              app.config['TESTING'] = True
              app.config['SECRET_KEY'] = 'test'
              import app as a
              a.USERS_FILE = str(tmp_path / 'users.json')
              a.DATA_FILE  = str(tmp_path / 'data.json')
              with app.test_client() as c:
                  yield c

          def test_health(client):
              r = client.get('/health')
              assert r.status_code == 200
              assert b'ok' in r.data

          def test_login_redirect(client):
              r = client.get('/')
              assert r.status_code == 302

          def test_25_states():
              assert len(STATES) == 25

          def test_states_have_required_fields():
              fields = ['overview','food','food_note','places','places_note','best_time','facts']
              for name, s in STATES.items():
                  for f in fields:
                      assert f in s, f"State {name} missing {f}"

          def test_quiz_questions():
              assert len(QUIZ_QUESTIONS) >= 10
              for q in QUIZ_QUESTIONS:
                  assert q['ans'] in q['options']

          def test_password_hash():
              assert _hash('abc') == _hash('abc')
              assert _hash('abc') != _hash('def')

          def test_signup_and_login(client):
              r = client.post('/signup', data={'username':'testuser','password':'password123','email':''})
              assert r.status_code in [200, 302]
          EOF
      - name: Run tests
        run: pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Security Scan (Bandit)
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - run: pip install bandit safety
      - name: Bandit (code security)
        run: bandit -r app.py --severity-level medium -f json -o bandit-report.json || true && bandit -r app.py --severity-level medium
      - name: Safety (dependency vulnerabilities)
        run: safety check -r requirements.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — SonarQube Analysis
# ─────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: 📊 SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history needed for blame info
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: Write sonar-project.properties
        run: |
          cat > sonar-project.properties << 'EOF'
          sonar.projectKey=incredible-india-tourism
          sonar.projectName=Incredible India Tourism App
          sonar.projectVersion=1.0
          sonar.sources=app.py,templates
          sonar.tests=tests
          sonar.python.coverage.reportPaths=coverage.xml
          sonar.python.version=3.11
          sonar.sourceEncoding=UTF-8
          sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/data/**
          sonar.coverage.exclusions=tests/**
          # Quality Gate thresholds
          sonar.qualitygate.wait=true
          EOF
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Docker Build & Push
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, security, sonarqube]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Docker Scout — vulnerability scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          only-severities: critical,high
          exit-code: false
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — Terraform Plan (always) / Apply (main only)
# ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ap-south-1
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format check
        working-directory: terraform
        run: terraform fmt -check -diff

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 7

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

# ─────────────────────────────────────────────────────────────────────────────
# JOB 7 — Deploy to Kubernetes
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [docker, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://india-tourism.yourdomain.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name india-tourism-prod-eks --region ap-south-1

      - name: Set image tag in manifest
        run: |
          IMAGE_TAG=${{ needs.docker.outputs.image_tag }}
          sed -i "s|your-registry/incredible-india-tourism:latest|${{ env.IMAGE_NAME }}:${IMAGE_TAG}|g" k8s/manifests.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/manifests.yaml

      - name: Update deployment image
        run: |
          kubectl set image deployment/india-tourism-app \
            app=${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/india-tourism-app \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Verify pods
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=india-tourism
          kubectl get svc  -n ${{ env.K8S_NAMESPACE }}

      - name: Smoke test
        run: |
          INGRESS_IP=$(kubectl get ingress india-tourism-ingress \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Testing endpoint: http://${INGRESS_IP}/health"
          curl -sf "http://${INGRESS_IP}/health" | grep -q '"status":"ok"'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 8 — GitHub Release
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Incredible India Tourism v1.0.${{ github.run_number }}"
          body: |
            ## 🇮🇳 Incredible India Tourism — Flask Web App

            **Docker Image:** `${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}`
            **Digest:** `${{ needs.docker.outputs.image_digest }}`
            **Commit:** `${{ github.sha }}`

            ### Features
            - Flask web app with Login / Signup / Guest mode
            - 25 Indian states — Overview, Food, Places, Best Time, Fun Facts
            - Favourites & Visited state tracking per user
            - India Quiz with 15 questions
            - REST API endpoints
            - Kubernetes deployment with HPA (autoscaling 2→10 pods)
            - SonarQube quality gate passed ✅

            ### Infrastructure
            - AWS EKS (Kubernetes) via Terraform
            - ECR for Docker images
            - Zero-downtime rolling updates
            - HTTPS via cert-manager + Let's Encrypt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 9 — Notify on Failure
# ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: 📣 Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, security, sonarqube, docker, terraform, deploy]
    if: failure()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ *India Tourism CI/CD FAILED*\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true