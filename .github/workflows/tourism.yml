name: Incredible India — Web CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/incredible-india-tourism

jobs:
  # ─────────────────────────────
  # 1. Build & Test
  # ─────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest || echo "No tests found, continuing..."

  # ─────────────────────────────
  # 2. SonarCloud Analysis
  # ─────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kashyapojha_Incredible-India-Tourism
            -Dsonar.organization=kashyapojha
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.qualitygate.wait=false

  # ─────────────────────────────
  # 3. Docker Build & Push
  # ─────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─────────────────────────────
  # 4. Test SSH connection
  # ─────────────────────────────
  test-ssh:
    name: Test SSH Connection
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: echo "SSH connection to EC2 works ✅"

  # ─────────────────────────────
  # 5. Deploy to EC2
  # ─────────────────────────────
  deploy:
    name: Deploy Docker to EC2
    runs-on: ubuntu-latest
    needs: [docker, test-ssh]

    # 🚀 Deploy ONLY on main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH and Deploy Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Pull latest Docker image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove old container if exists
            docker stop tourism-app || true
            docker rm tourism-app || true

            # Run new container
            docker run -d -p 80:80 --name tourism-app ${{ env.IMAGE_NAME }}:latest

            echo "Deployment complete ✅"